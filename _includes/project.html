<header class="header-small">
  <div class="header-content">
    <h1>{{ page.title }}</h1>
  </div>
</header>

<section class="bg-primary blog">
  <div class="container blog">
    {%- if page.category %}
      <div class="container project-categories">
        <span class="project-category">{{ page.category }}</span>
      </div>
    {%- endif %}
    {%- if page.timeline %}
      <ul class="container project-timeline">
        {%- for milestone in page.timeline %}
          <li><span class="timeline-date">{{ milestone.date }}</span> {{ milestone.label }}</li>
        {%- endfor %}
      </ul>
    {%- endif %}
    <div class="container blog-content">
      {{ content }}
    </div>
    <div class="container project-cta text-center">
      <p><a href="/donate.html">Support more stories like this one</a></p>
    </div>
  </div>
</section>
